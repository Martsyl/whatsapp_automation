<!DOCTYPE html>
<html>
<head>
    <title>Check Your Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #075e54, #128c7e); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center">
                <div style="font-size:3rem;">📧</div>
                <h4 class="fw-bold mt-3">Check Your Email</h4>
                <p class="text-muted">
                    If <strong>{{ email }}</strong> is registered,
                    you'll receive a password reset link shortly.
                </p>
                <p class="text-muted small">
                    The link expires in 1 hour.<br>
                    Check your spam folder if you don't see it.
                </p>
                <a href="{% url 'client_login' %}" class="btn btn-outline-secondary mt-3">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
